# =============================================================================
# Nexus Twin — Docker Compose (modo desenvolvimento local)
#
# Backend e Frontend rodam localmente (fora do Docker).
# Apenas infraestrutura (banco, cache, tiles, roteamento) sobe via compose.
#
# Uso:
#   docker compose up -d
#   cd backend  && uvicorn src.main:app --reload --port 8000
#   cd frontend && npm run dev
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL + PostGIS — banco principal do mundo (estado persistente)
  # Acesso local: postgresql://nexus:nexus@localhost:5432/nexus_twin
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:15-3.4
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: nexus_twin
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_twin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — pub/sub (world_state, agent_decisions, events) + broker Celery
  # Acesso local: redis://localhost:6379
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Martin — servidor de vector tiles (PMTiles gerados pelo Planetiler)
  # Serve tiles para o MapLibre no frontend: http://localhost:3001
  # Tambem expoe tabelas PostGIS como vector tiles dinamicos
  # ---------------------------------------------------------------------------
  martin:
    image: ghcr.io/maplibre/martin
    ports:
      - "3001:3000"
    command: /data/sudeste.pmtiles --listen-addresses 0.0.0.0:3000
    volumes:
      - ./geo/data:/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Valhalla — engine de roteamento (rotas reais por rodovias do OSM)
  # API local: POST http://localhost:8002/route { costing: "truck" }
  # Tiles pre-compilados em geo/data/valhalla_tiles/ (use_tiles_ignore_pbf=True)
  # ---------------------------------------------------------------------------
  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    ports:
      - "8002:8002"
    volumes:
      - ./geo/data/valhalla_tiles:/custom_files
    environment:
      use_tiles_ignore_pbf: "True"

  # ===========================================================================
  # Langfuse (self-hosted) — observability dos agentes LLM (OPCIONAL)
  # Dashboard local: http://localhost:3100
  # Se LANGFUSE_PUBLIC_KEY/LANGFUSE_SECRET_KEY estiverem vazias no backend/.env,
  # a instrumentacao fica desativada — estes servicos podem permanecer parados.
  # ===========================================================================

  langfuse-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 10

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    environment:
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse
      CLICKHOUSE_DB: default
    volumes:
      - langfuse_clickhouse:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  langfuse-redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "langfuse"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "langfuse", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: langfuse
      MINIO_ROOT_PASSWORD: langfuse1234
    volumes:
      - langfuse_minio:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: creates the event-upload bucket that langfuse-worker expects.
  # Without this the worker logs `NoSuchBucket` and silently drops every trace.
  langfuse-minio-init:
    image: minio/mc
    depends_on:
      langfuse-minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set lf http://langfuse-minio:9000 langfuse langfuse1234 &&
        mc mb --ignore-existing lf/langfuse &&
        echo "bucket ready"
    restart: "no"

  # NOTE: the worker depends on langfuse-web because web runs the Prisma
  # migrations on boot (creates pricing_tiers, prices, etc.), and the worker's
  # first task is seedDefaultModelPrices — which writes into those tables.
  # If the worker boots first it fails silently and model costs stay $0 until
  # something restarts the worker.
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_started
      langfuse-minio-init:
        condition: service_completed_successfully
      langfuse-web:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      REDIS_AUTH: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: langfuse1234
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      # Replace these in production — generate all three via `openssl rand -hex 32`.
      # Must be quoted so YAML does not coerce hex-looking strings to numbers.
      NEXTAUTH_SECRET: "mysecret-change-in-prod"
      SALT: "mysalt-change-in-prod"
      ENCRYPTION_KEY: "31bac9b36c366e9284b5fa8f72777c50da42c292dc83c4dd2ec834694051f8a2"
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"

  langfuse-web:
    image: langfuse/langfuse:3
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_started
      langfuse-minio-init:
        condition: service_completed_successfully
    ports:
      - "3100:3000"
    healthcheck:
      # Next.js binds to the container IP (not 127.0.0.1), so hit $(hostname).
      test: ["CMD-SHELL", "wget -qO- http://$$(hostname):3000/api/public/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      REDIS_AUTH: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: langfuse1234
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      NEXTAUTH_URL: http://localhost:3100
      NEXTAUTH_SECRET: "mysecret-change-in-prod"
      SALT: "mysalt-change-in-prod"
      ENCRYPTION_KEY: "31bac9b36c366e9284b5fa8f72777c50da42c292dc83c4dd2ec834694051f8a2"
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      # Auto-provisioning on first boot (runs only when the langfuse postgres
      # is empty). All INIT_* vars must be present for the init to fire — if
      # any is missing, the script exits silently and nothing is created.
      LANGFUSE_INIT_ORG_ID: nexus-twin-org
      LANGFUSE_INIT_ORG_NAME: NexusTwin
      LANGFUSE_INIT_PROJECT_ID: nexus-twin
      LANGFUSE_INIT_PROJECT_NAME: NexusTwin
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: "pk-lf-nexus-twin-local"
      LANGFUSE_INIT_PROJECT_SECRET_KEY: "sk-lf-nexus-twin-local"
      LANGFUSE_INIT_USER_EMAIL: "admin@nexustwin.local"
      LANGFUSE_INIT_USER_NAME: "NexusTwin Admin"
      LANGFUSE_INIT_USER_PASSWORD: "nexustwin1234"

  # ---------------------------------------------------------------------------
  # Backend e Frontend rodam localmente — comentados no compose
  # ---------------------------------------------------------------------------
  # backend:
  #   build:
  #     context: ./backend
  #   ports:
  #     - "8000:8000"
  #   env_file:
  #     - .env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

  # frontend:
  #   build:
  #     context: ./frontend
  #   ports:
  #     - "5173:80"
  #   depends_on:
  #     - backend

volumes:
  pgdata:
  langfuse_pgdata:
  langfuse_clickhouse:
  langfuse_minio:
