# =============================================================================
# Nexus Twin — Docker Compose (modo desenvolvimento local)
#
# Backend e Frontend rodam localmente (fora do Docker).
# Apenas infraestrutura (banco, cache, tiles, roteamento) sobe via compose.
#
# Uso:
#   docker compose up -d
#   cd backend  && uvicorn src.main:app --reload --port 8000
#   cd frontend && npm run dev
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL + PostGIS — banco principal do mundo (estado persistente)
  # Acesso local: postgresql://nexus:nexus@localhost:5432/nexus_twin
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:15-3.4
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: nexus_twin
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_twin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — pub/sub (world_state, agent_decisions, events) + broker Celery
  # Acesso local: redis://localhost:6379
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Martin — servidor de vector tiles (PMTiles gerados pelo Planetiler)
  # Serve tiles para o MapLibre no frontend: http://localhost:3001
  # Tambem expoe tabelas PostGIS como vector tiles dinamicos
  # ---------------------------------------------------------------------------
  martin:
    image: ghcr.io/maplibre/martin
    ports:
      - "3001:3000"
    command: /data/sudeste.pmtiles --listen-addresses 0.0.0.0:3000
    volumes:
      - ./geo/data:/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Valhalla — engine de roteamento (rotas reais por rodovias do OSM)
  # API local: POST http://localhost:8002/route { costing: "truck" }
  # Tiles pre-compilados em geo/data/valhalla_tiles/ (use_tiles_ignore_pbf=True)
  # ---------------------------------------------------------------------------
  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    ports:
      - "8002:8002"
    volumes:
      - ./geo/data/valhalla_tiles:/custom_files
    environment:
      use_tiles_ignore_pbf: "True"

  # ---------------------------------------------------------------------------
  # Backend e Frontend rodam localmente — comentados no compose
  # ---------------------------------------------------------------------------
  # backend:
  #   build:
  #     context: ./backend
  #   ports:
  #     - "8000:8000"
  #   env_file:
  #     - .env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

  # frontend:
  #   build:
  #     context: ./frontend
  #   ports:
  #     - "5173:80"
