services:
  postgres:
    image: postgis/postgis:15-3.4
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: nexus_twin
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_twin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  martin:
    image: ghcr.io/maplibre/martin
    ports:
      - "3001:3000"
    volumes:
      - ./geo/data:/data
    environment:
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexus_twin
    depends_on:
      postgres:
        condition: service_healthy

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    ports:
      - "8002:8002"
    volumes:
      - ./geo/data/valhalla_tiles:/custom_files
    environment:
      use_tiles_ignore_pbf: "True"

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
